<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro - Physical Center</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
        FORMULÁRIO
========================= -->

<section class="form">

<h2>Cadastro do aluno</h2>

<!-- Nome -->
<input 
id="nome" 
type="text" 
placeholder="Nome">

<!-- Email -->
<input 
id="email" 
type="email" 
placeholder="Email">

<!-- Telefone -->
<input 
id="telefone" 
type="tel" 
placeholder="Telefone">

<!-- Senha -->
<input 
id="senha" 
type="password" 
placeholder="Senha">

<!-- Confirmar senha -->
<input 
id="confirmarSenha" 
type="password" 
placeholder="Confirmar senha">

<!-- Plano escolhido -->
<input 
id="plano" 
type="text" 
placeholder="Plano escolhido"
disabled>

<!-- Botão -->
<button onclick="finalizarCadastro()">
Finalizar cadastro
</button>

<p>
Já tem conta?
<a href="login.html">Fazer login</a>
</p>

</section>

<!-- JAVASCRIPT -->
<script src="script.js"></script>

</body>

</html>
